- table_name: customer
  queries:
  - key: Retrieve all records
    description: Retrieve all records from the customer table.
    query: SELECT * FROM customer;
  - key: Find the maximum value
    description: Find the row with the maximum value in a numeric column of the customer
      table.
    query: SELECT * FROM customer WHERE numeric_column = (SELECT MAX(numeric_column)
      FROM customer);
  - key: Count total rows
    description: Count the total number of rows in the customer table.
    query: SELECT COUNT(*) FROM customer;
  - key: Get distinct values
    description: Retrieve distinct values of a specific column from the customer table.
    query: SELECT DISTINCT column_name FROM customer;
  - key: Filter records
    description: Filter records based on a condition in the customer table.
    query: SELECT * FROM customer WHERE condition;
  - key: Sort records
    description: Sort records by a specific column in the customer table.
    query: SELECT * FROM customer ORDER BY column_name ASC;
